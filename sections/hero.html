<section id="hero">
  <div class="section-inner hero-grid">
    <!-- Left column: intro text -->
    <div class="hero-text reveal">
      <span class="hero-location">
        <img src="assets/icons/map-pin.svg" alt="" class="icon" />
        <!-- Typed/looping text is injected by js/hero.js.
             To change the cities, edit the LOCATIONS array in js/hero.js. -->
        <span class="typewriter" id="typewriter"></span>
        <span class="type-cursor" aria-hidden="true"></span>
      </span>

      <h1 class="hero-greeting" data-i18n="hero.greeting">Hi! I'm Deira</h1>
      <p class="hero-role" data-i18n="hero.role">An Aspiring AI Engineer/Data Scientist</p>
      <p class="hero-desc" data-i18n="hero.desc">
        Bridging data science and engineering to build intelligent systems —
        from data pipelines to production deployment.
      </p>

      <div class="hero-pills">
        <a class="pill" href="https://linkedin.com/in/deira-aisyarefani" target="_blank" rel="noopener">
          <img src="assets/icons/linkedin-logo.svg" alt="" class="icon" />
          LinkedIn
        </a>
        <a class="pill" href="https://github.com/deiraaisya" target="_blank" rel="noopener">
          <img src="assets/icons/github-logo.svg" alt="" class="icon" />
          GitHub
        </a>
        <a class="pill" href="mailto:deiraaisyarefani@gmail.com">
          <img src="assets/icons/envelope.svg" alt="" class="icon" />
          deiraaisyarefani@gmail.com
        </a>
        <!-- TODO: replace href="#" with the link to your CV (Google Drive / PDF URL) -->
        <a class="pill" id="cv-link" href="#" target="_blank" rel="noopener">
          <svg class="pill-svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="8" y1="13" x2="16" y2="13" />
            <line x1="8" y1="17" x2="16" y2="17" />
          </svg>
          Curriculum Vitae
        </a>
      </div>
    </div>

    <!-- Right column: single-photo carousel with prev/next controls -->
    <!-- To add a photo: drop a file into assets/images/ and add one <img> as a .carousel-slide below. -->
    <div class="hero-carousel reveal" id="hero-carousel">
      <div class="carousel-viewport">
        <div class="carousel-track" id="carousel-track">
          <img class="carousel-slide" src="assets/images/pelatihan-dsai.jpeg" alt="Pelatihan DSAI" loading="lazy" />
          <img class="carousel-slide" src="assets/images/bemmipa.jpeg" alt="BEM MIPA" loading="lazy" />
          <img class="carousel-slide" src="assets/images/cimsathon-group.jpeg" alt="Cimsathon group" loading="lazy" />
          <img class="carousel-slide" src="assets/images/hology-group.jpeg" alt="Hology group" loading="lazy" />
          <img class="carousel-slide" src="assets/images/sic-group.jpeg" alt="SIC group" loading="lazy" />
          <img class="carousel-slide" src="assets/images/pelatihan-komatik.jpeg" alt="Pelatihan Komatik" loading="lazy" />
          <img class="carousel-slide" src="assets/images/compfest-group.jpeg" alt="Compfest group" loading="lazy" />
          <img class="carousel-slide" src="assets/images/techfest-sendiri.jpeg" alt="Techfest" loading="lazy" />
        </div>
      </div>

      <button class="carousel-btn carousel-prev" id="carousel-prev" aria-label="Previous photo">
        <img src="assets/icons/arrow-circle-left.svg" alt="" class="icon" />
      </button>
      <button class="carousel-btn carousel-next" id="carousel-next" aria-label="Next photo">
        <img src="assets/icons/arrow-circle-right.svg" alt="" class="icon" />
      </button>

      <div class="carousel-dots" id="carousel-dots"></div>
    </div>
  </div>
</section>
